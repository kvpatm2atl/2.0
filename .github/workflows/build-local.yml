name: 🤖 Build Android APK (No EAS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK via Expo Prebuild + Gradle
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: 🏗 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java (required by Gradle) ───────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install JS dependencies ─────────────────────────────────────────
      - name: 📦 Install JS dependencies
        run: npm install --legacy-peer-deps

      # ── 6. Write .env for build ────────────────────────────────────────────
      - name: 🔐 Write environment variables
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      # ── 7. Expo Prebuild → generates android/ native project ───────────────
      - name: ⚙️ Expo Prebuild (generate Android native project)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # ── 8. Gradle cache (speeds up subsequent runs) ────────────────────────
      - name: 📂 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 9. Build APK ───────────────────────────────────────────────────────
      - name: 🔨 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🏗 Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # ── 10a. Sign with RELEASE keystore (if secret provided) ──────────────
      - name: 🔏 Sign APK with release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f release.keystore

      # ── 10b. Sign with DEBUG keystore (fallback — no secrets needed) ───────
      - name: 🔑 Sign APK with debug keystore (fallback)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 11. Upload APK ─────────────────────────────────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvs-edushield-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: ✅ Build summary
        run: |
          echo "APK built successfully!"
          ls -lh android/app/build/outputs/apk/release/*.apk

